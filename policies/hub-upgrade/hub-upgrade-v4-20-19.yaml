---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: hub-upgrade-v4-20-19
placementBindingDefaults:
  name: hub-upgrade-v4-20-19-placement-binding
policyDefaults:
  namespace: ztp-policies
  remediationAction: inform
  consolidateManifests: true
  placement:
    name: hub-upgrade-v4-20-19-placement
    labelSelector:
      matchLabels:
        name: local-cluster
policies:
  - name: platform-upgrade-prep
    manifests:
      - path: reference-crs/ImageSignature.yaml
        patches:
          - binaryData:
              "sha256:e37bcdba07c7312607363ddf5a8e317e4b6952b1465704b38c9a081d095697be": 
  
  - name: upgrade-420
    manifests:
      - path: reference-crs/ClusterVersion.yaml
        patches:
          - apiVersion: config.openshift.io/v1
            kind: ClusterVersion
            metadata:
              name: version
            spec:
              channel: "stable-4.21"
              desiredUpdate:
                image: quay.io/openshift-release-dev/ocp-release@sha256:e37bcdba07c7312607363ddf5a8e317e4b6952b1465704b38c9a081d095697be
                version: 4.20.19
            status:
              history:
                - version: 4.20.19
                  state: "Completed"
